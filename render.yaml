services:
  - type: web
    name: ezy-pay-bank-webhook
    env: node
    plan: free
    buildCommand: npm install && npm run db:generate && cd apps/bank-webhook && npm run build
    startCommand: cd apps/bank-webhook && npm run start
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: PORT
        value: 3003
